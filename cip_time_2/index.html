<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIP time 2</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>CIP time 2</h1>
    </header>

    <main>
        <form>
            <div class="formItem">
                <label for="produto">Produto:</label>
                <input type="text" id="produto" name="produto" required>
            </div>

            <div class="formItem">
                <label for="caracteristicas">Características do Produto:</label>
                <textarea id="carac" name="carac" style="resize: none;" required></textarea>
            </div>

            <div class="formItem">
                <label for="valor">Valor unitário do produto:</label>
                <input type="number" id="valor" name="valor" step="0.01" required>
            </div>

            <div class="formItem">
                <label for="unidade">Unidade:</label>
                <input type="text" id="unidade" name="unidade" required>
            </div>

            <div class="formItem">
                <label>Tipo produto:</label>
                <div class="radioGroup">
                    <div>
                        <input type="radio" id="tipo1" name="tipo" value="1" required>
                        <label for="tipo1">Tipo 1 (isento de imposto)</label>
                    </div>
                    <div>
                        <input type="radio" id="tipo2" name="tipo" value="2">
                        <label for="tipo2">Tipo 2 (8% de imposto)</label>
                    </div>
                    <div>
                        <input type="radio" id="tipo3" name="tipo" value="3">
                        <label for="tipo3">Tipo 3 (10% de imposto)</label>
                    </div>
                    <div>
                        <input type="radio" id="tipo4" name="tipo" value="4">
                        <label for="tipo4">Tipo 4 (12% de imposto)</label>
                    </div>
                    <div>
                        <input type="radio" id="tipo5" name="tipo" value="5">
                        <label for="tipo5">Tipo 5 (17% de imposto)</label>
                    </div>
                </div>
            </div>

            <div class="formItem">
                <button type="submit">Enviar</button>
            </div>
        </form>

        <hr>

        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Características</th>
                    <th>Valor Unitário</th>
                    <th>Unidade</th>
                    <th>Tipo de Produto</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <tr>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>
                        <input type="number" value="0" min="0">
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>

</html>
