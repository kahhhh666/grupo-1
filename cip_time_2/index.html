<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIP time 2</title>
</head>

<body>
    <header>
        <h1>CIP time 2</h1>
    </header>

    <main>
        <form>
            <div class="formItem">
                <label for="produto">Produto:</label>
                <input type="text" id="produto" name="produto" required>
            </div>

            <div class="formItem">
                <label for="caracteristicas">Características do Produto:</label>
                <textarea id="carac" name="carac" style="resize: none;" required></textarea>
            </div>

            <div class="formItem">
                <label for="valor">Valor unitário do produto:</label>
                <input type="number" id="valor" name="valor" step="0.01" required>
            </div>

            <div class="formItem">
                <label for="unidade">Unidade:</label>
                <input type="text" id="unidade" name="unidade" required>
            </div>

            <div class="formItem">
                <label for="tipo">Tipo produto:</label>
                <select id="tipo" name="tipo" required>
                    <option value="1">Tipo 1 (isento de imposto)</option>
                    <option value="2">Tipo 2 (8% de imposto)</option>
                    <option value="3">Tipo 3 (10% de imposto)</option>
                    <option value="4">Tipo 4 (12% de imposto)</option>
                    <option value="5">Tipo 5 (17% de imposto)</option>
                </select>
            </div>
        </form>
    </main>
</body>

</html>
