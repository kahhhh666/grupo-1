<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Veículos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/scriptVec.js" defer type="module""></script>
</head>
<body>

<div class="container">

    <div class="card">
        <h1>Cadastro de Veículos</h1>

        <form id="formVeiculo">

         
            <input type="text" name="modelo" id="modelo" placeholder="Modelo" required>

       
            <input type="text" name="marca" id="marca" placeholder="Marca" required>

            <input type="text" name="placa" id="placa" placeholder="Placa" required>

         
            <input type="date" name="ano" id="ano" placeholder="Ano de fabricação" required >

            <input type="text" name="cor" id="cor" placeholder="Cor do veículo" required>

       
            <input type="number" name="valor" id="valor" placeholder="Valor do veículo" required>

           
            <div class="radio-group">

                <label>
                    <input type="radio" id="gasolina" name="combustivel" value="gasolina"  required>
                    Gasolina
                </label>

                <label>
                    <input type="radio" id="etanol" name="combustivel" value="etanol"required>
                    Etanol
                </label>

                <label>
                    <input type="radio" id="bicombustivel" name="combustivel" value="bicombustivel" required>
                    Bicombustível
                </label>

                <label>
                    <input type="radio" id="hibrido" name="combustivel" value="hibrido" required>
                    Híbrido
                </label>

                <label>
                    <input type="radio" id="eletrico" name="combustivel" value="eletrico" required>
                    Elétrico
                </label>
            </div>

        
            <button id="btnEnviar" type="submit">Adicionar</button>

        </form>
    </div>

    <!-- LISTA -->
    <div class="lista" id="listaVeiculos">
        <!-- JS vai inserir aqui -->   
    </div>
</div>

</body>

</html>
